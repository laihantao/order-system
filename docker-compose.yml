networks:
  redis-net:
    driver: bridge

services:
  app:
    image: ghcr.io/laihantao/order-system:latest
    build: .
    container_name: java-order-system
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis-master
    networks:
      - redis-net
      
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: order_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    networks:
      - redis-net

  redis-master:
    image: redis:7
    container_name: redis-master
    ports:
      - "6379:6379"
    networks:
      - redis-net
    command: >
      redis-server 
        --port 6379
        --replica-announce-ip redis-master
        --replica-announce-port 6379

  redis-replica-1:
    image: redis:7
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-server 
      --replicaof redis-master 6379
      --replica-announce-ip redis-replica-1
      --replica-announce-port 6379

  redis-replica-2:
    image: redis:7
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-server 
      --replicaof redis-master 6379
      --replica-announce-ip redis-replica-2
      --replica-announce-port 6379

  sentinel-1:
    image: redis:7
    container_name: sentinel-1
    ports:
      - "26379:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    command: >
      sh -c "cp /readonly/sentinel.conf /etc/redis/sentinel.conf && 
             redis-sentinel /etc/redis/sentinel.conf 
             --sentinel announce-ip sentinel-1
             --sentinel announce-port 26379"
    volumes:
      - ./sentinel.conf:/readonly/sentinel.conf:ro
      - sentinel2-data:/etc/redis/

  sentinel-2:
    image: redis:7
    container_name: sentinel-2
    ports:
      - "26380:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      sh -c "cp /readonly/sentinel.conf /etc/redis/sentinel.conf && 
             redis-sentinel /etc/redis/sentinel.conf 
             --sentinel announce-ip sentinel-2
             --sentinel announce-port 26380"
    volumes:
      - ./sentinel.conf:/readonly/sentinel.conf:ro
      - sentinel2-data:/etc/redis/

  sentinel-3:
    image: redis:7
    container_name: sentinel-3
    ports:
      - "26381:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      sh -c "cp /readonly/sentinel.conf /etc/redis/sentinel.conf && 
             redis-sentinel /etc/redis/sentinel.conf 
             --sentinel announce-ip sentinel-3
             --sentinel announce-port 26381"
    volumes:
      - ./sentinel.conf:/readonly/sentinel.conf:ro
      - sentinel3-data:/etc/redis/
  
volumes:
  sentinel1-data:
  sentinel2-data:
  sentinel3-data: