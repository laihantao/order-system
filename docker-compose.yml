networks:
  redis-net:
    driver: bridge
services:
  redis-master:
    image: redis:7
    container_name: redis-master
    ports:
      - "6379:6379"
    networks:
      - redis-net
    command: ["redis-server", "--appendonly", "yes"]

  redis-replica-1:
    image: redis:7
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-server
      --replicaof redis-master 6379
      --appendonly yes

  redis-replica-2:
    image: redis:7
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-server
      --replicaof redis-master 6379
      --appendonly yes

  sentinel-1:
    image: redis:7
    container_name: sentinel-1
    ports:
      - "26379:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf

  sentinel-2:
    image: redis:7
    container_name: sentinel-2
    ports:
      - "26380:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf

  sentinel-3:
    image: redis:7
    container_name: sentinel-3
    ports:
      - "26381:26379"
    networks:
      - redis-net
    depends_on:
      - redis-master
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf