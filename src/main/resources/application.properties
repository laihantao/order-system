spring.application.name=order-system

## Not longer using localhost since we are using Docker Compose
# spring.datasource.url=jdbc:postgresql://localhost:5432/order_system
spring.datasource.url=jdbc:postgresql://postgres:5432/order_system
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.order_system
mybatis.configuration.map-underscore-to-camel-case=true

# Not longer needed since we are using Redis Sentinel
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

spring.data.redis.sentinel.master=mymaster
spring.data.redis.sentinel.nodes=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379


management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.endpoints.web.base-path=/actuator