port 26379

# monitor <master-name> <ip> <port> <quorum>
sentinel monitor mymaster redis-master 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000

# parallel-syncs controls how many replicas are reconfigured simultaneously.
# Setting this to 1 ensures the read-pool remains available during failover.

sentinel resolve-hostnames yes
sentinel announce-hostnames yes
# Generated by CONFIG REWRITE
dir "/data"
latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid ce17377ee17bbbc8d7d6827dd0c59dafbc5a918e
sentinel config-epoch mymaster 0
sentinel leader-epoch mymaster 0
sentinel current-epoch 0

sentinel known-replica mymaster redis-replica-2 6379

sentinel known-replica mymaster redis-replica-1 6379

sentinel known-sentinel mymaster 172.18.0.10 26379 6d1ba40e1521f330868357dc0e0abedea8cecc75

sentinel known-sentinel mymaster 172.18.0.9 26379 e3dc0031a36ed99aa30ad29ac25faea6b0055ebf

